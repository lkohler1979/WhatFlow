# ─────────────────────────────────────────────────────────────────────────────
# WhatFlow — nginx (serve o SPA Angular + reverse proxy para a API)
#
# Topologia recomendada: Cloudflare (proxy "laranja") na frente do VPS.
#   - Padrão deste arquivo: nginx escuta em :80. O TLS público é provido pela
#     Cloudflare. Configure o SSL/TLS da Cloudflare em "Full (strict)" e instale
#     um Origin Certificate (ver bloco TLS comentado abaixo + docs/DEPLOY.md).
#   - Recupera o IP real do visitante via header CF-Connecting-IP (lista de
#     ranges da Cloudflare abaixo — atualize por https://www.cloudflare.com/ips/).
# ─────────────────────────────────────────────────────────────────────────────

# IPs da Cloudflare → confiar no CF-Connecting-IP como IP real do cliente.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

upstream whatflow_api {
  server api:3000;
  keepalive 32;
}

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_types text/plain text/css application/javascript application/json
           application/xml image/svg+xml application/wasm;

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Limite de upload (importação de CSV de contatos etc.).
  client_max_body_size 15m;

  # Headers de segurança (a Cloudflare cuida do HSTS/TLS na borda).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  root /usr/share/nginx/html;
  index index.html;

  # ── API REST ──
  location /v1/ {
    proxy_pass http://whatflow_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Health check da API (útil p/ monitoração externa).
  location = /health {
    proxy_pass http://whatflow_api/health;
    proxy_set_header Host $host;
  }

  # Swagger da API (se habilitado no backend — T-052).
  location /docs {
    proxy_pass http://whatflow_api/docs;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── WebSocket (Socket.io — realtime do Inbox/instâncias/campanhas) ──
  location /socket.io/ {
    proxy_pass http://whatflow_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  # ── SPA Angular (fallback p/ rotas client-side) ──
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo dos assets com hash; index.html nunca cacheia.
  location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# TLS no origin (Cloudflare "Full (strict)") — RECOMENDADO para produção.
# 1) Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate.
# 2) Salve o cert e a key em ./nginx/certs/origin.pem e ./nginx/certs/origin.key
#    (o compose monta ./nginx/certs em /etc/nginx/certs:ro).
# 3) Cloudflare → SSL/TLS → Overview → modo "Full (strict)".
# 4) Descomente o bloco abaixo, troque o `listen 80` acima por um redirect 301
#    para https, e recrie o container nginx.
#
# server {
#   listen 443 ssl http2;
#   listen [::]:443 ssl http2;
#   server_name seu-dominio.com;
#   ssl_certificate     /etc/nginx/certs/origin.pem;
#   ssl_certificate_key /etc/nginx/certs/origin.key;
#   ssl_protocols TLSv1.2 TLSv1.3;
#   # ... (mesmos blocos location / /v1/ /socket.io/ /docs do server :80 acima) ...
# }
# ─────────────────────────────────────────────────────────────────────────────
