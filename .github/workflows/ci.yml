name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: API — Lint + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # Monorepo npm workspaces: instala na raiz (lockfile único)
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint --workspace=apps/api
      # Cobertura obrigatória (T-049): o gate de 70% do jest.config bloqueia o CI se <70%.
      - run: npm run test:coverage --workspace=apps/api
      - run: npm run build --workspace=apps/api

  web:
    name: Web — Test + Build (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Karma/Jasmine (T-050): ubuntu-latest já traz Chrome instalado.
      - run: npm run test --workspace=apps/web -- --watch=false --code-coverage
        env:
          CHROME_BIN: /usr/bin/google-chrome
      - run: npm run build:prod --workspace=apps/web
      # TODO(P-08): habilitar lint do Angular quando houver angular-eslint configurado
      # - run: npm run lint --workspace=apps/web

  deploy-staging:
    name: Deploy Staging
    needs: [api, web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "🚀 Deploy automático para staging aqui"
        # Adicionar aqui: ssh, docker push, fly.io, render, etc.
