services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: whatflow-api
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=development
      # Dentro da rede do compose o Redis é resolvido pelo nome do serviço
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    # Bind mounts apenas do código (hot-reload). NÃO montar node_modules:
    # volume anônimo persistente sombreava o node_modules da imagem.
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: whatflow-web
    ports:
      - "4200:4200"
    volumes:
      - ./apps/web/src:/app/apps/web/src
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: whatflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bull-board:
    image: deadly0/bull-board:latest
    container_name: whatflow-bull-board
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: whatflow-network
