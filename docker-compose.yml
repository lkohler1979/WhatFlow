services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: whatflow-api
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=development
      # Dentro da rede do compose o Redis é resolvido pelo nome do serviço
      - REDIS_URL=redis://redis:6379
      # No compose usamos a Evolution LOCAL (sobrepõe a hospedada do .env)
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=whatflow-local-dev
      # URL que a Evolution usa para mandar webhooks de volta (rede do compose)
      - WEBHOOK_BASE_URL=http://api:3000/v1
      # Hot-reload no Windows/Docker: o filesystem montado nem sempre emite eventos
      # inotify, então forçamos polling (envs inofensivas). P-18.
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      # Obs.: o `tsx watch` (usa chokidar) deve honrar CHOKIDAR_USEPOLLING. Se mesmo
      # assim o hot-reload não disparar ao editar o backend, em último caso rode:
      #   docker compose restart api
    depends_on:
      redis:
        condition: service_healthy
    # Bind mounts apenas do código (hot-reload). NÃO montar node_modules:
    # volume anônimo persistente sombreava o node_modules da imagem.
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: whatflow-web
    ports:
      - "4200:4200"
    volumes:
      - ./apps/web/src:/app/apps/web/src
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: whatflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bull-board:
    image: deadly0/bull-board:latest
    container_name: whatflow-bull-board
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    restart: unless-stopped

  # ── Evolution API local (alternativa à hospedada) ──
  evolution-postgres:
    image: postgres:15-alpine
    container_name: whatflow-evolution-pg
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: whatflow-evolution
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: whatflow-local-dev
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: whatflow
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      DEL_INSTANCE: "false"
    depends_on:
      evolution-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  evolution_pg:

networks:
  default:
    name: whatflow-network
