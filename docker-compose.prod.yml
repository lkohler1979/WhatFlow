version: '3.9'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: whatflow-api
    ports:
      - "3000:3000"
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: whatflow-redis
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  redis_data:
